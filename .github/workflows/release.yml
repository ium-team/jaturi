name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            binary_name: jaturi
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary_name: jaturi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary_name: jaturi.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME="${{ matrix.binary_name }}"
          OUT_NAME="jaturi-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          cp "scripts/install.sh" "dist/install.sh"
          chmod +x "dist/install.sh"
          cp README.md dist/README.md
          tar -C dist -czf "${OUT_NAME}.tar.gz" "${BIN_NAME}" "install.sh" "README.md"
          test -f "${OUT_NAME}.tar.gz"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BinName = "${{ matrix.binary_name }}"
          $OutName = "jaturi-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$BinName" "dist/$BinName"
          Copy-Item "scripts/install.ps1" "dist/install.ps1"
          Copy-Item "README.md" "dist/README.md"
          Compress-Archive -Path "dist/$BinName", "dist/install.ps1", "dist/README.md" -DestinationPath "$OutName.zip" -Force
          if (-not (Test-Path "$OutName.zip")) { throw "Missing archive: $OutName.zip" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaturi-${{ github.ref_name }}-${{ matrix.target }}
          path: jaturi-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name "jaturi-*" -exec cp {} release/ \;
          ls -1 release

      - name: Verify expected assets exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          test -f "release/jaturi-${TAG}-x86_64-unknown-linux-musl.tar.gz"
          test -f "release/jaturi-${TAG}-aarch64-apple-darwin.tar.gz"
          test -f "release/jaturi-${TAG}-x86_64-pc-windows-msvc.zip"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum jaturi-* > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/jaturi-*.tar.gz
            release/jaturi-*.zip
            release/SHA256SUMS.txt
